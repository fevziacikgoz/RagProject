<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nexora RAG Asistanı</title>
  <style>
    :root {
      --bg:#0d1117; --panel:#161b2e; --txt:#c9d1d9; --muted:#8b949e;
      --blue:#58a6ff; --teal:#2dd4bf; --user:#1f6feb; --border:#21283b;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; height:100vh; display:flex; flex-direction:column;
      background:var(--bg); color:var(--txt);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }
    header {
      padding:16px 20px; border-bottom:1px solid var(--border);
      font-weight:600; font-size:18px;
    }
    header span { color:var(--teal); }
    header small { display:block; font-weight:400; font-size:12px; color:var(--muted); margin-top:2px; }

    #chat {
      flex:1; overflow-y:auto; padding:24px;
      display:flex; flex-direction:column; gap:14px; max-width:900px; width:100%; margin:0 auto;
    }
    .msg {
      max-width:78%; padding:12px 16px; border-radius:14px;
      line-height:1.55; white-space:pre-wrap; word-wrap:break-word;
    }
    .user { align-self:flex-end; background:var(--user); color:#fff; border-bottom-right-radius:4px; }
    .bot  { align-self:flex-start; background:var(--panel); border:1px solid var(--border); border-bottom-left-radius:4px; }
    .meta { margin-top:8px; font-size:12px; color:var(--muted); }

    form {
      display:flex; gap:10px; padding:16px 20px; border-top:1px solid var(--border);
      max-width:900px; width:100%; margin:0 auto;
    }
    input {
      flex:1; padding:13px 16px; border-radius:10px; border:1px solid #30363d;
      background:#0b0e16; color:var(--txt); font-size:15px; outline:none;
    }
    input:focus { border-color:var(--blue); }
    input:disabled { opacity:.5; }
    button {
      padding:13px 24px; border:none; border-radius:10px; cursor:pointer;
      background:var(--blue); color:#fff; font-weight:600; font-size:15px;
    }
    button:disabled { opacity:.5; cursor:default; }

    /* Hazırlanıyor ekranı */
    #loading {
      position:fixed; inset:0; z-index:10;
      background:rgba(13,17,23,.97);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
      text-align:center; padding:24px;
    }
    .spinner {
      width:52px; height:52px; border:4px solid var(--border);
      border-top-color:var(--teal); border-radius:50%;
      animation:spin .9s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loadingTitle { font-size:18px; font-weight:600; color:var(--txt); }
    #loadingText  { font-size:13px; color:var(--muted); }
    .err { color:#f85149; }
  </style>
</head>
<body>
  <header>🧠 Nexora <span>RAG Asistanı</span>
    <small>.NET + pgvector + OpenAI · semantic cache · hybrid arama · kaynak gösterimli</small>
  </header>

  <!-- Açılış: dökümanlar indexlenirken spinner -->
  <div id="loading">
    <div class="spinner"></div>
    <div id="loadingTitle">Asistan hazırlanıyor…</div>
    <div id="loadingText">Dökümanlar okunuyor ve vektörleniyor, bu birkaç saniye sürebilir.</div>
  </div>

  <div id="chat"></div>
  <form id="f">
    <input id="q" placeholder="Soru sor… (örn. Pizza günü hangi gün? / Senior maaşı nedir?)" autocomplete="off" disabled>
    <button id="send" disabled>Gönder</button>
  </form>

  <script>
    const chat  = document.getElementById('chat');
    const form  = document.getElementById('f');
    const input = document.getElementById('q');
    const send  = document.getElementById('send');
    const loading = document.getElementById('loading');

    // ── Hazır olana kadar /api/status'u yokla, spinner göster ──
    (async function waitReady() {
      while (true) {
        try {
          const s = await (await fetch('/api/status')).json();
          if (s.ready) {
            loading.style.display = 'none';
            input.disabled = false; send.disabled = false; input.focus();
            return;
          }
          if (s.failed) {
            document.getElementById('loadingTitle').textContent = 'Hazırlık başarısız';
            document.getElementById('loadingText').innerHTML =
              '<span class="err">' + (s.error || 'Bilinmeyen hata') + '</span>';
            document.querySelector('.spinner').style.display = 'none';
            return;
          }
        } catch (_) { /* sunucu daha ayağa kalkıyor olabilir */ }
        await new Promise(r => setTimeout(r, 600));
      }
    })();

    // ── Soru gönder ──
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;

      addMsg('user', q);
      input.value = '';
      send.disabled = true;

      const bot  = addMsg('bot', '');
      const body = document.createElement('span');
      bot.appendChild(body);

      const es = new EventSource('/api/ask/stream?q=' + encodeURIComponent(q));
      es.onmessage = (ev) => {
        const d = JSON.parse(ev.data);
        if (d.type === 'token') {
          body.textContent += d.text;
          chat.scrollTop = chat.scrollHeight;
        } else if (d.type === 'done') {
          const tag = d.fromCache ? '⚡ önbellek (LLM\'e gidilmedi)' : '🤖 LLM';
          const src = (d.sources && d.sources.length) ? ' · 📎 ' + d.sources.join(', ') : '';
          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = tag + src;
          bot.appendChild(meta);
          es.close();
          send.disabled = false;
          input.focus();
        }
      };
      es.onerror = () => { es.close(); send.disabled = false; };
    });

    function addMsg(cls, text) {
      const d = document.createElement('div');
      d.className = 'msg ' + cls;
      if (text) d.textContent = text;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
      return d;
    }
  </script>
</body>
</html>
